name: Move Linear QA tickets to Done on PR to main

# Solo después del merge a main (no al abrir ni al pushear al PR)
on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  linear-update:
    runs-on: ubuntu-latest
    # Solo si el PR se fusionó (no si se cerró sin merge) y viene de develop o release/*
    if: github.event.pull_request.merged == true && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/'))
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Find Linear tickets and move QA → Done
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          # Debe coincidir con el nombre del equipo en Linear (Settings → Teams). Por defecto Bearpoint.
          LINEAR_TEAM_NAME: ${{ vars.LINEAR_TEAM_NAME || 'Bearpoint' }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          # La rama suele ser vin-20-... o similar y no siempre está en título/body
          PR_HEAD_REF: ${{ github.head_ref }}
          # Nombres/descripciones de etiquetas (Linear/GitHub suelen poner VIN-XX aquí)
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Extraer VIN-XX: título, body, rama, etiquetas y commits del PR (paginado)
          # develop→main suele tener rama "develop" sin id; si el PR solo tiene 1 commit sin VIN,
          # añade etiqueta VIN-XX o incluye VIN-XX en el título del PR.
          echo "PR_HEAD_REF=${PR_HEAD_REF:-}"
          echo "PR_TITLE (preview): $(echo "${PR_TITLE:-}" | head -c 120)..."

          TICKET_IDS=$(python3 .github/scripts/extract-vin-ticket-ids.py) || true

          if [ -z "${TICKET_IDS:-}" ]; then
            echo "No Linear tickets found (título, body, rama, etiquetas ni commits). Skipping."
            echo "Tip: etiqueta el PR con VIN-XX, o pon VIN-XX en el título, o en un mensaje de commit."
            exit 0
          fi

          echo "Found tickets: $TICKET_IDS"

          # Obtener el ID del estado "Done" y "QA" via Linear API (equipo: LINEAR_TEAM_NAME, default Bearpoint)
          WORKFLOW_STATES=$(python3 .github/scripts/linear_fetch_workflow_states.py)

          echo "Linear team filter: $LINEAR_TEAM_NAME"
          echo "Workflow states: $WORKFLOW_STATES"

          QA_STATE_ID=$(echo "$WORKFLOW_STATES" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if data.get('errors'):
              print('Linear GraphQL errors:', data['errors'], file=sys.stderr)
          states = (data.get('data') or {}).get('workflowStates') or {}
          nodes = states.get('nodes') or []
          for s in nodes:
              if s['name'].lower() == 'qa':
                  print(s['id'])
                  break
          ")

          DONE_STATE_ID=$(echo "$WORKFLOW_STATES" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          states = (data.get('data') or {}).get('workflowStates') or {}
          nodes = states.get('nodes') or []
          for s in nodes:
              if s['name'].lower() == 'done':
                  print(s['id'])
                  break
          ")

          echo "QA state ID: $QA_STATE_ID"
          echo "Done state ID: $DONE_STATE_ID"

          if [ -z "$DONE_STATE_ID" ]; then
            echo "Could not find Done state (nodes vacío o nombre de equipo incorrecto)."
            echo "Configura en el repo: Settings → Variables → LINEAR_TEAM_NAME = nombre exacto del equipo en Linear."
            exit 1
          fi

          # Para cada ticket encontrado
          for TICKET_ID in $TICKET_IDS; do
            echo "Processing $TICKET_ID..."

            # Obtener el estado actual del ticket
            ISSUE_DATA=$(curl -s -X POST \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"query\": \"{ issue(id: \\\"$TICKET_ID\\\") { id state { id name } } }\"
              }" \
              https://api.linear.app/graphql)

            CURRENT_STATE=$(echo $ISSUE_DATA | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          issue = data.get('data', {}).get('issue')
          if issue:
              print(issue['state']['name'])
          ")

            ISSUE_UUID=$(echo $ISSUE_DATA | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          issue = data.get('data', {}).get('issue')
          if issue:
              print(issue['id'])
          ")

            echo "$TICKET_ID current state: $CURRENT_STATE"

            # Solo mover si está en QA
            if [ "$CURRENT_STATE" = "QA" ]; then
              echo "Moving $TICKET_ID from QA to Done..."

              UPDATE_RESULT=$(curl -s -X POST \
                -H "Authorization: $LINEAR_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{
                  \"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_UUID\\\", input: { stateId: \\\"$DONE_STATE_ID\\\" }) { success issue { id state { name } } } }\"
                }" \
                https://api.linear.app/graphql)

              SUCCESS=$(echo $UPDATE_RESULT | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('data', {}).get('issueUpdate', {}).get('success', False))
          ")

              if [ "$SUCCESS" = "True" ]; then
                echo "✅ $TICKET_ID moved to Done"
              else
                echo "❌ Failed to update $TICKET_ID: $UPDATE_RESULT"
              fi
            else
              echo "⏭️ $TICKET_ID is in '$CURRENT_STATE', not QA. Skipping."
            fi
          done
